name: Deploy Vite React App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Install dependencies
        run: just ci

      - name: Build
        run: just build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Lovestuffy.com/dist

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
